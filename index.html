<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coke's Terminal 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a;
  color: #e8e8e8;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 16px 60px;
}
.terminal { width: 100%; max-width: 640px; }
.header { text-align: center; margin-bottom: 36px; }
.coke-img {
  width: 160px; height: 110px;
  object-fit: cover; object-position: center 60%;
  border-radius: 16px; border: 2px solid #E8212B;
  margin-bottom: 14px; display: block;
  margin-left: auto; margin-right: auto;
}
.terminal-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #E8212B; letter-spacing: 0.06em; }
.terminal-sub { font-size: 11px; color: #555; letter-spacing: 0.15em; margin-top: 4px; }
.screen {
  background: #111; border: 1px solid #222;
  border-radius: 12px; padding: 28px;
  min-height: 200px; margin-bottom: 28px;
}
.screen-line { line-height: 2; font-size: 13.5px; color: #ccc; white-space: pre-wrap; }
.screen-line .red { color: #E8212B; font-weight: bold; }
.screen-line .green { color: #4ade80; }
.screen-line .yellow { color: #facc15; }
.screen-line .dim { color: #444; }
.cursor {
  display: inline-block; width: 9px; height: 15px;
  background: #E8212B; animation: blink 1s step-end infinite;
  vertical-align: middle; margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }
.plate-section { display: none; flex-direction: column; align-items: center; gap: 20px; }
.plate-section.active { display: flex; }
.plate-label { font-size: 11px; color: #555; letter-spacing: 0.18em; text-transform: uppercase; }
.plate-wrapper {
  display: flex; align-items: center; gap: 8px;
  background: #1a1a1a; border: 2px solid #333;
  border-radius: 10px; padding: 14px 20px;
  transition: border-color 0.3s; cursor: text;
}
.plate-wrapper.active-input { border-color: #E8212B; }
.plate-wrapper.correct { border-color: #4ade80; }
.plate-wrapper.wrong { border-color: #f87171; animation: shake 0.3s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.plate-segment { display: flex; gap: 4px; }
.plate-char {
  width: 28px; height: 40px;
  background: #222; border: 1px solid #333;
  border-radius: 6px; display: flex;
  align-items: center; justify-content: center;
  font-size: 20px; font-weight: bold; color: #fff;
  font-family: 'Share Tech Mono', monospace;
  transition: background 0.2s, color 0.2s;
}
.plate-char.filled { background: #1f1f1f; color: #E8212B; }
.plate-char.active-cursor { background: #1a0000; border-color: #E8212B; }
.plate-dash { font-size: 24px; color: #444; font-weight: bold; line-height: 40px; }
.real-input { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
.btn {
  background: #E8212B; color: white; border: none;
  padding: 12px 36px; border-radius: 100px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; cursor: pointer; letter-spacing: 0.08em;
  transition: all 0.2s;
}
.btn:hover { background: #c41922; transform: translateY(-1px); }
.btn:disabled { background: #333; color: #666; cursor: default; transform: none; }
.progress { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #222; border: 1px solid #333; transition: all 0.4s; }
.dot.done { background: #E8212B; border-color: #E8212B; }
.dot.current { background: #1a0000; border-color: #E8212B; animation: pulse 1.5s infinite; }
@keyframes pulse { 50% { box-shadow: 0 0 10px #E8212B88; } }
.reveal { display: none; text-align: center; }
.reveal.active { display: block; }
.reveal img { width: 100%; border-radius: 16px; border: 2px solid #E8212B; margin-bottom: 20px; }
.reveal-text { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #E8212B; margin-bottom: 12px; }
.reveal-sub { font-size: 13px; color: #888; line-height: 1.8; }
</style>
</head>

let currentPlate = 0;

function buildPlate(idx) {
  const p = plates[idx];
  const wrapper = document.getElementById('plateWrapper');
  wrapper.innerHTML = '';
  let charIdx = 0;
  p.segments.forEach((len, si) => {
    const seg = document.createElement('div');
    seg.className = 'plate-segment';
    for (let i = 0; i < len; i++) {
      const box = document.createElement('div');
      box.className = 'plate-char';
      box.id = 'pc_' + charIdx;
      seg.appendChild(box);
      charIdx++;
    }
    wrapper.appendChild(seg);
    if (si < p.segments.length - 1) {
      const dash = document.createElement('div');
      dash.className = 'plate-dash';
      dash.textContent = '–';
      wrapper.appendChild(dash);
    }
  });
  document.getElementById('plateLabel').textContent = 'Placa #' + (idx+1) + ' · ' + p.name;
  const input = document.getElementById('realInput');
  input.value = '';
  input.maxLength = p.answer.replace(/-/g, '').length;
  updateBoxes('');
}

function updateBoxes(val) {
  const p = plates[currentPlate];
  const total = p.answer.replace(/-/g, '').length;
  for (let i = 0; i < total; i++) {
    const box = document.getElementById('pc_' + i);
    if (!box) continue;
    if (i < val.length) {
      box.textContent = val[i].toUpperCase();
      box.className = 'plate-char filled';
    } else if (i === val.length) {
      box.textContent = '';
      box.className = 'plate-char active-cursor';
    } else {
      box.textContent = '';
      box.className = 'plate-char';
    }
  }
}

document.getElementById('realInput').addEventListener('input', function() {
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  updateBoxes(this.value);
  document.getElementById('plateWrapper').className = 'plate-wrapper active-input';
});

document.getElementById('realInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPlate();
});

document.getElementById('plateWrapper').addEventListener('click', function() {
  document.getElementById('realInput').focus();
});

function checkPlate() {
  const input = document.getElementById('realInput');
  const raw = input.value.toUpperCase();
  const p = plates[currentPlate];
  const correct = p.answer.replace(/-/g, '');
  if (raw === correct) {
    document.getElementById('plateWrapper').className = 'plate-wrapper correct';
    document.getElementById('checkBtn').disabled = true;
    setTimeout(() => nextPlate(), 900);
  } else {
    document.getElementById('plateWrapper').className = 'plate-wrapper wrong';
    setTimeout(() => {
      document.getElementById('plateWrapper').className = 'plate-wrapper active-input';
    }, 600);
    appendLine('<yellow>Hmm... no es esa. Vuelve a leer las pistas. 🐾</yellow>');
  }
}

function nextPlate() {
  document.getElementById('dot' + currentPlate).className = 'dot done';
  currentPlate++;
  if (currentPlate >= plates.length) {
    document.getElementById('plateSection').className = 'plate-section';
    setOutput('');
    appendLine('<green>🎉 ¡TODAS LAS PLACAS DESCIFRADAS! 🎉</green>');
    appendLine('');
    appendLine('Lo lograste. Ahora ya sabes quién eres.');
    appendLine('');
    appendLine('Y ahora...  🥁🥁🥁');
    setTimeout(() => {
      document.getElementById('reveal').className = 'reveal active';
    }, 1800);
    return;
  }
  document.getElementById('dot' + currentPlate).className = 'dot current';
  document.getElementById('checkBtn').disabled = false;
  typeHints(currentPlate);
}

function setOutput(html) {
  document.getElementById('output').innerHTML = html;
}

function appendLine(html) {
  const out = document.getElementById('output');
  out.innerHTML += (out.innerHTML ? '\n' : '') + parseColors(html);
}

function parseColors(text) {
  return text
    .replace(/<red>(.*?)<\/red>/g, '<span class="red">$1</span>')
    .replace(/<green>(.*?)<\/green>/g, '<span class="green">$1</span>')
    .replace(/<yellow>(.*?)<\/yellow>/g, '<span class="yellow">$1</span>')
    .replace(/<dim>(.*?)<\/dim>/g, '<span class="dim">$1</span>');
}

function typeHints(idx) {
  const p = plates[idx];
  document.getElementById('plateSection').className = 'plate-section';
  setOutput('');
  buildPlate(idx);
  let i = 0;
  function nextHint() {
    if (i >= p.hints.length) {
      setTimeout(() => {
        document.getElementById('plateSection').className = 'plate-section active';
        document.getElementById('realInput').focus();
      }, 300);
      return;
    }
    appendLine(p.hints[i]);
    i++;
    const delay = p.hints[i-1] === '' ? 200 : p.hints[i-1].startsWith('🐾') ? 700 : 500;
    setTimeout(nextHint, delay);
  }
  nextHint();
}

function init() {
  buildPlate(0);
  const intro = [
    "Hola... sí, hola tú. 👀",
    "Soy Coke. Ya sé que viniste por el pastel.",
    "Pero aquí las cosas no son tan fáciles. 🐾",
    "",
    "Para abrir esa lata, necesitas descifrar",
    "<red>4 placas</red>. Cada una está hecha con algo tuyo.",
    "",
    "Yo te doy las pistas. Tú armas la placa.",
    "<dim>─────────────────────────────────────────</dim>",
  ];
  let i = 0;
  function nextLine() {
    if (i >= intro.length) { setTimeout(() => typeHints(0), 400); return; }
    appendLine(intro[i]);
    i++;
    setTimeout(nextLine, intro[i-1] === '' ? 250 : 650);
  }
  nextLine();
}

window.onload = init;
